<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Sabrina Novaes">
    <meta name="description" content="Aplicação de previsão do tempo que permite aos usuários consultar as condições climáticas atuais 
        para qualquer cidade do mundo. A interface é simples e intuitiva, oferecendo informações 
        detalhadas sobre temperatura, hórarios local e condições meteorológicas.">
    <meta name="robots" content="index, follow">

    <!-- Ícones de clima -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
    <!-- Estilo CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Previsão do Tempo</title>
</head>

<body>
    <main class="container">
        <h1><i class="wi wi-day-cloudy" style="margin-right: 8px; color: var(--primary);"></i>Previsão do Tempo</h1>

        <form id="weather-form" class="weather-form">
            <input type="text" id="city-input" placeholder="Digite o nome da cidade" required />
            <button type="submit">Buscar</button>
        </form>

        <!-- 🔥 padronizado com CSS -->
        <div id="result" class="weather-result" aria-live="polite"></div>

        <!-- Botão Home -->
        <button id="home-btn" class="home-btn" aria-label="Voltar para o início">
            <img class="home-icon" src="https://img.icons8.com/material-outlined/24/home--v2.png" alt="Ícone home" />
        </button>
    </main>

    <footer class="footer">
        <p class="footer-copy">
            © 2026 Sabrina Novaes — Todos os direitos reservados
        </p>

        <p class="footer-apis">
            Dados fornecidos por
            <a href="https://open-meteo.com/en/docs" target="_blank">
                Open-Meteo API
            </a>
            e
            <a href="https://open-meteo.com/en/docs/geocoding-api" target="_blank">
                Geocoding API
            </a>
        </p>
    </footer>

    <script src="api.js"></script>
</body>

</html>
